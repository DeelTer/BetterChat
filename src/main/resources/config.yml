translation:
  enabled: true

icons:
  copy: "📋"
  hide: "👁️‍🗨️"
  command: "⚡"
  link: "🔗"

# Отключение встроенных обработчиков по идентификаторам.
# Доступные идентификаторы: confusion, underwater, strength, weakness, scale,
# cave, invisibility, darkness, spectate, tag,
# url_label, url, copy, hide, command, chat
#
# Пример: ["cave", "darkness"] отключит пещерное эхо и эффект темноты.
disabled-processors: []

chat:
  formats:
    default: "<prefix><color1><sender><suffix>:</color1> <color2><message></color2>"
    cave: "<color:#D0CAA5><sender>:</color> <color:#EFEEE6><message></color>"
    spectator-inside: "<color:#CBCCD2>[...]:</color> <color:#EFF0F6><message></color>"
    spectator-entity: "<color:#CBCCD2><sender>:</color> <color:#EFF0F6><message></color>"
    sculk: "<color:#375e5b><sender>:</color> <color:#688a87><message></color>"
  colors:
    default: "#FFD700"
    default2: "#c7b9a6"
    spectate: "#CBCCD2"
    spectate2: "#EFF0F6"
    underwater: "#6BCCE4"
    underwater2: "#B4D9E2"
    invisible: "#D0CAA5"
    invisible2: "#EFEEE6"
    darkness: "#654C7D"
    darkness2: "#A795B9"
tags:
  global:
    symbol: "!"
    radius: -1
    format: "<color:#525252><lang:com.chat.global></color> <prefix><color1><sender><suffix>:</color1> <color2><message></color2>"
  trade:
    symbol: "$"
    radius: -1
    format: "<color:#9DFF00><lang:com.chat.trade></color> <prefix><color1><sender><suffix>:</color1> <color2><message></color2>"

