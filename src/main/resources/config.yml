# =================================================================
#  BetterChat Configuration
# =================================================================
#  Flexible chat system with modifiers, bubbles and auto-translation.
#
#  MiniMessage format tester: https://webui.advntr.dev/
#  Plugin website: https://deelter.ru
#
#  Permissions:
#    betterchat.use     - Allows using chat with all modifiers
#                          (default: true for all players)
#
#  Commands:
#    /chat <text>        - Send a chat message with tag support
#    /lang <code>        - Set your preferred chat language
#
#  Mechanics:
#    - Chat formatting changes based on player state (underwater, darkness, etc.)
#    - Auto-translation between players with different languages
#    - Chat bubbles (TextDisplay entities above players)
#    - Custom tags (!global, $trade) with configurable radius and format
#    - Inline replacements: [copy:text], [hide:secret], [cmd:/command], [link:label:url]
#    - Automatic URL detection with service-specific icons
# =================================================================

# Language & translation settings
language:
  # Default language for the server (used when auto-detect is off)
  # Available: en, ru, uk, de, es, fr, zh (add your own .yml in lang/ folder)
  default: "en"
  # Automatically use player's client locale for plugin messages
  auto-detect: true

translation:
  # Enable automatic chat translation between players with different languages
  # Translated messages show original text on hover
  enabled: true

# bStats metrics collection
metrics:
  # Send anonymous usage statistics to bstats.org
  # Disable if you prefer not to share data
  enabled: true

# Chat bubble display icons
# You can use any Unicode/emoji characters supported by Minecraft
icons:
  copy: "📋"      # Copy to clipboard button
  hide: "👁️‍"   # Hidden text reveal button
  command: "⚡"    # Command execution button
  link: "🔗"       # URL link indicator

# Disable specific built-in processors by their IDs
# Available IDs: confusion, underwater, strength, weakness, scale,
# cave, invisibility, darkness, spectate, tag,
# url_label, url, copy, hide, command, chat
#
# Example: ["cave", "darkness"] disables cave echo and darkness effect
disabled-processors: [ ]

# Chat bubble appearance settings
bubbles:
  queue-tick-interval: 3
  # Default text width in pixels (prevents overly wide bubbles)
  default-width: 200
  # Minimum display time in ticks (20 ticks = 1 second)
  min-ticks: 40
  # Vertical offset above the entity (in blocks)
  offset-y: 0.25
  # Billboard type: FIXED, VERTICAL, HORIZONTAL, CENTER
  # CENTER - always faces the viewer (most readable)
  billboard: "CENTER"
  # Text shadow for better readability
  shadow: false
  # See-through when behind blocks
  see-through: false
  # Default background rectangle behind text
  default-background: false
  # Pop-up animation when bubble appears
  min-tps-for-animation: 18.0
  min-tps-for-bubbles: 14.0
  animation:
    pop-up:
      enabled: true
      start-scale: 0.015      # Initial tiny size (20% of normal)
      duration-ticks: 3     # Animation duration (20 ticks = 1 second)

# Chat format and color settings
chat:
  # Message format templates
  # Available placeholders: <prefix>, <suffix>, <sender>, <message>, <color1>, <color2>
  formats:
    default: "<prefix><color1><sender><suffix>:</color1> <color2><message></color2>"
    cave: "<color:#D0CAA5><sender>:</color> <color:#EFEEE6><message></color>"
    spectator-inside: "<color:#CBCCD2>[...]:</color> <color:#EFF0F6><message></color>"
    spectator-entity: "<color:#CBCCD2><sender>:</color> <color:#EFF0F6><message></color>"
    sculk: "<color:#375e5b><sender>:</color> <color:#688a87><message></color>"
  # Color presets used by chat processors
  colors:
    default: "#FFD700"
    default2: "#c7b9a6"
    spectate: "#CBCCD2"
    spectate2: "#EFF0F6"
    underwater: "#6BCCE4"
    underwater2: "#B4D9E2"
    invisible: "#D0CAA5"
    invisible2: "#EFEEE6"
    darkness: "#654C7D"
    darkness2: "#A795B9"

# Chat tags - prefix symbols that modify message radius and format
tags:
  global:
    symbol: "!"
    radius: -1          # -1 = unlimited radius (global message)
    format: "<color:#525252>[G]</color> <prefix><color1><sender><suffix>:</color1> <color2><message></color2>"
  trade:
    symbol: "$"
    radius: -1          # -1 = unlimited radius
    format: "<color:#9DFF00>$</color> <prefix><color1><sender><suffix>:</color1> <color2><message></color2>"
  server:
    symbol: ""
    radius: -1          # -1 = unlimited radius
    format: "<color:#9DFF00>$</color> <prefix><color1><sender><suffix>:</color1> <color2><message></color2>"

mentions:
  enabled: true
  color: "#FFD700"
  sound: "block.note_block.bell"
  bypass-permission: "betterchat.mention.bypass"

anti-spam:
  enabled: true
  similarity-threshold: 0.9   # 0.0 – 1.0 (0-100%)
  recent-messages-count: 5

